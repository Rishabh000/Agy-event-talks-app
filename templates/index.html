<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & Share Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo-area">
                <div class="bq-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 22h20L12 2z" fill="url(#gradient-triangle)"/>
                        <circle cx="12" cy="14" r="4" fill="#1e293b"/>
                        <circle cx="12" cy="14" r="2" fill="#38bdf8"/>
                        <defs>
                            <linearGradient id="gradient-triangle" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#8b5cf6"/>
                                <stop offset="1" stop-color="#06b6d4"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>BigQuery</h1>
                    <p>Release Notes Share Hub</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-secondary" title="Toggle Light/Dark Mode" style="padding: 0.75rem;">
                    <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn btn-secondary" title="Export Current List to CSV">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Controls Section -->
        <section class="controls-card">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search release notes by keyword (e.g. Gemini, Studio, quota)...">
            </div>
            
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-tab active" data-type="all">All Updates</button>
                <button class="filter-tab" data-type="feature">Features</button>
                <button class="filter-tab" data-type="change">Changes</button>
                <button class="filter-tab" data-type="deprecation">Deprecations</button>
                <button class="filter-tab" data-type="issue">Issues</button>
            </div>
        </section>

        <!-- Stats / Feed Info -->
        <div class="feed-info">
            <span id="update-count">Loading updates...</span>
            <span class="pulse-indicator"></span>
        </div>

        <!-- Main Feed Grid -->
        <main class="feed-grid" id="feed-grid">
            <!-- Loading Skeleton (Initial State) -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </main>
    </div>

    <!-- Twitter/X Share Modal -->
    <div class="modal-overlay" id="tweet-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Share on Twitter / X</h2>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="selected-note-preview">
                    <div class="preview-badge" id="preview-type-badge">Feature</div>
                    <div class="preview-date" id="preview-date">June 15, 2026</div>
                    <div class="preview-text" id="preview-text">
                        Use Gemini Cloud Assist to analyze your SQL queries and receive recommendations to optimize query performance in BigQuery.
                    </div>
                </div>

                <div class="tweet-editor-area">
                    <label for="tweet-textarea">Compose your post:</label>
                    <textarea id="tweet-textarea" rows="5" maxlength="500"></textarea>
                    
                    <div class="tweet-options">
                        <div class="hashtags-wrapper">
                            <span class="hashtag-chip" data-tag="#BigQuery">#BigQuery</span>
                            <span class="hashtag-chip" data-tag="#GoogleCloud">#GoogleCloud</span>
                            <span class="hashtag-chip" data-tag="#GCP">#GCP</span>
                            <span class="hashtag-chip" data-tag="#Gemini">#Gemini</span>
                            <span class="hashtag-chip" data-tag="#DataAnalytics">#DataAnalytics</span>
                        </div>
                    </div>

                    <div class="tweet-footer">
                        <div class="char-counter">
                            <svg class="progress-ring" width="24" height="24">
                                <circle class="progress-ring-bg" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" fill="transparent" r="10" cx="12" cy="12"/>
                                <circle class="progress-ring-bar" id="counter-ring" stroke="#38bdf8" stroke-width="2.5" fill="transparent" r="10" cx="12" cy="12"/>
                            </svg>
                            <span id="char-count-text">280</span>
                        </div>
                        <button id="send-tweet-btn" class="btn btn-tweet">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            <span>Share Post</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript logic -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
